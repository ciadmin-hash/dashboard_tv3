<!DOCTYPE html>
<html>
<head>
  <script>
    let links = [
      "https://datastudio.google.com/reporting/54cbafde-95c2-47c7-a64c-be41fae8d1f7/page/xKDBD",
      "https://datastudio.google.com/reporting/54cbafde-95c2-47c7-a64c-be41fae8d1f7/page/p_r6uhfi964c",
      "https://datastudio.google.com/reporting/54cbafde-95c2-47c7-a64c-be41fae8d1f7/page/p_lop11xcrfd",
      "https://datastudio.google.com/reporting/ad854046-5ff8-433c-9203-9156693d0e7b/page/p_s9hkzjr2jd",
      "https://datastudio.google.com/reporting/ad854046-5ff8-433c-9203-9156693d0e7b/page/p_q0f2quc12d"
    ];

    let delay = 15000; // 15 detik

    function rotate() {
      let start = localStorage.getItem("startTime");

      // set waktu awal kalau belum ada
      if (!start) {
        start = Date.now();
        localStorage.setItem("startTime", start);
      } else {
        start = parseInt(start);
      }

      // hitung index berdasarkan waktu berjalan
      let elapsed = Math.floor((Date.now() - start) / delay);
      let index = elapsed % links.length;

      // redirect ke dashboard sesuai index
      window.location.href = links[index];
    }

    window.onload = function () {
      // langsung tentukan halaman saat load
      rotate();

      // pindah lagi setelah delay
      setTimeout(function () {
        rotate();
      }, delay);
    };
  </script>
</head>
<body>
</body>
</html>
